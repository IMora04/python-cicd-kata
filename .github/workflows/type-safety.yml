name: Type Safety
run-name: Run type safety checking for ${{ github.ref }} on ${{ github.event_name }} event

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run type checking with Pyright
        run: uv run pyright
